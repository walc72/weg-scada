server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to weg-api
    location /api/ {
        proxy_pass http://weg-api:3200/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /status/* to weg-api for drive status (MQTT/SSE)
    location /status {
        proxy_pass http://weg-api:3200/status;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA fallback — all unmatched routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever, never cache index.html
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
