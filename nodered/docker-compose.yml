##############################################################################
# WEG Monitoring Stack - Docker Compose
# Node-RED + InfluxDB 2.x + Grafana + Mosquitto (MQTT optional)
#
# Usage:
#   cp .env.example .env   # fill in your credentials
#   docker-compose up -d
#
# Access:
#   Node-RED Dashboard:  http://localhost:1880/ui
#   Node-RED Editor:     http://localhost:1880
#   Grafana:             http://localhost:3000
#   InfluxDB:            http://localhost:8086
#
# Stop:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f nodered
##############################################################################

version: "3.8"

networks:
  weg-network:
    driver: bridge

volumes:
  nodered-data:
    driver: local
  influxdb-data:
    driver: local
  influxdb-config:
    driver: local
  grafana-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local
  csv-export:
    driver: local
  tailscale-data:
    driver: local
  poller-config:
    driver: local

services:

  ##########################################################################
  # NODE-RED - Flow engine + Dashboard
  ##########################################################################
  nodered:
    image: nodered/node-red:4.0.9
    container_name: weg-nodered
    restart: unless-stopped
    networks:
      - weg-network
    ports:
      - "1880:1880"
    volumes:
      - nodered-data:/data
      - csv-export:/data/csv-export
      - ./weg-modbus-poller/config.json:/data/poller-config.json
    environment:
      - TZ=${TZ:-America/Mexico_City}
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  ##########################################################################
  # INFLUXDB 2.x - Time-series database
  ##########################################################################
  influxdb:
    image: influxdb:2.7
    container_name: weg-influxdb
    restart: unless-stopped
    networks:
      - weg-network
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - TZ=${TZ:-America/Mexico_City}
      # --- Auto-setup on first run ---
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-WEG_Monitoring}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-weg_drives}
      - DOCKER_INFLUXDB_INIT_RETENTION=365d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  ##########################################################################
  # GRAFANA - Advanced dashboards & alerting
  ##########################################################################
  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: weg-grafana
    restart: unless-stopped
    networks:
      - weg-network
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - TZ=${TZ:-America/Mexico_City}
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/weg-overview.json
      # --- SMTP for email alerts ---
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GF_SMTP_USER}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM}
      - GF_SMTP_FROM_NAME=WEG Monitoring
      # --- Alerting ---
      - GF_UNIFIED_ALERTING_ENABLED=true
      # --- Allow embedding in iframes (Node-RED dashboard) ---
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  ##########################################################################
  # TAILSCALE - VPN mesh for remote drive access (testing)
  ##########################################################################
  tailscale:
    image: tailscale/tailscale:v1.82.5
    container_name: weg-tailscale
    restart: unless-stopped
    networks:
      - weg-network
    hostname: weg-scada
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=--advertise-tags=tag:weg-scada
    ports: []

  ##########################################################################
  # MOSQUITTO - MQTT Broker
  ##########################################################################
  mosquitto:
    image: eclipse-mosquitto:2.0.21
    container_name: weg-mosquitto
    restart: unless-stopped
    networks:
      - weg-network
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  ##########################################################################
  # WEG MODBUS POLLER - Standalone Modbus TCP polling service
  # Reads all WEG drives via Modbus, publishes to MQTT + writes InfluxDB
  # Config: ./weg-modbus-poller/config.json (hot-reload on change)
  ##########################################################################
  modbus-poller:
    build: ./weg-modbus-poller
    container_name: weg-modbus-poller
    restart: unless-stopped
    networks:
      - weg-network
    volumes:
      - ./weg-modbus-poller/config.json:/app/config/config.json
    environment:
      - TZ=${TZ:-America/Mexico_City}
      - CONFIG_PATH=/app/config/config.json
      - MQTT_BROKER=mqtt://mosquitto:1883
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "try{require('fs').readFileSync('/tmp/poller-healthy');process.exit(0)}catch(e){process.exit(1)}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  ##########################################################################
  # WEG API - REST API for config, setpoints, alerts, reports
  # Centralizes all business logic outside Node-RED
  ##########################################################################
  weg-api:
    build: ./weg-api
    container_name: weg-api
    restart: unless-stopped
    networks:
      - weg-network
    ports:
      - "3200:3200"
    volumes:
      - ./weg-modbus-poller/config.json:/app/config/config.json
    environment:
      - TZ=${TZ:-America/Mexico_City}
      - PORT=3200
      - CONFIG_PATH=/app/config/config.json
      - MQTT_BROKER=mqtt://mosquitto:1883
      # Alert notifications (optional, configure when ready)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${GF_SMTP_USER:-}
      - SMTP_PASS=${GF_SMTP_PASSWORD:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
